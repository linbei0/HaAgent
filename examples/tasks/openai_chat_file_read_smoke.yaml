goal: 像个人助手一样读取 notes.txt，说明里面有什么，并包含文件中的 exact smoke phrase。
workspace_root: ../workspaces/file_read_smoke
constraints:
  - This task is for manual OpenAI-compatible chat provider file_read smoke testing.
  - It represents a simple local-file assistant task, not a code-only workflow.
  - The model must call file_read on notes.txt before producing the final answer.
  - The final answer must include the exact smoke phrase from notes.txt.
  - Do not use any tool except file_read.
allowed_tools:
  - file_read
acceptance_criteria:
  - Run reaches completed state.
  - The episode records a file_read success in tool-calls.jsonl.
  - The final model response includes the exact smoke phrase.
verification_commands: []
