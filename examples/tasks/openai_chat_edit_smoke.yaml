goal: 检查这个小项目，修复 app.py 中的 add 函数，运行验证，并解释修改和结果。
workspace_root: ../workspaces/edit_smoke
constraints:
  - This task is for manual OpenAI-compatible chat provider edit-and-verify smoke testing.
  - Code editing is one HaAgent task type, not the only product center.
  - First read app.py with file_read.
  - Fix add(a, b) so it returns the sum of a and b.
  - Use apply_patch for the edit.
  - Run the verification command after editing.
  - Final answer must summarize the code change and verification result.
allowed_tools:
  - file_read
  - apply_patch
  - shell
acceptance_criteria:
  - Run reaches completed state.
  - The episode records file_read, apply_patch, and shell tool success.
  - Verification command passes locally.
  - Final model response explains the modification and verification result.
verification_commands:
  - uv run pytest test_app.py -q
policy:
  approval_allowed_tools:
    - apply_patch
    - shell
  approved_tools:
    - apply_patch
    - shell
