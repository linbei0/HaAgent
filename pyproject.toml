[project]
name = "agent-foundry"
version = "0.1.0"
description = "Harness-first agent runtime MVP."
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0.0",
]

[project.scripts]
agentfoundry = "agentfoundry.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentfoundry"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
