[project]
name = "agent-foundry"
version = "0.1.0"
description = "Harness-first agent runtime MVP."
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_foundry"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
